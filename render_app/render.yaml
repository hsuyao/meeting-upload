services:
  - type: web
    name: meeting-upload
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: PORT
        value: "5000"
      - key: PYTHON_VERSION
        value: "3.11"